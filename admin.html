<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>F3 Logo Overlay — Admin</title>
  <style>
    :root {
      --dark: #1a1a2e;
      --blue: #0f3460;
      --white: #ffffff;
      --light: #f5f5f5;
      --gray: #e0e0e0;
      --red: #c0392b;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--light);
      color: var(--dark);
      padding: 20px;
      max-width: 700px;
      margin: 0 auto;
    }
    h1 { font-size: 22px; margin-bottom: 4px; }
    .subtitle { color: #888; font-size: 14px; margin-bottom: 24px; }
    .section { background: var(--white); border-radius: 12px; padding: 20px; margin-bottom: 20px; }
    .section h2 { font-size: 16px; margin-bottom: 12px; }
    label { display: block; font-weight: 600; margin-bottom: 6px; font-size: 14px; }
    input[type="text"], input[type="file"] {
      width: 100%; padding: 10px; border: 1px solid var(--gray);
      border-radius: 8px; font-size: 14px; margin-bottom: 12px;
    }
    .btn {
      display: inline-block; padding: 12px 20px; border: none; border-radius: 8px;
      font-size: 14px; font-weight: 600; cursor: pointer; font-family: inherit;
    }
    .btn-primary { background: var(--dark); color: var(--white); }
    .btn-danger { background: var(--red); color: var(--white); }
    .btn-secondary { background: var(--gray); color: var(--dark); }
    .btn:hover { opacity: 0.9; }
    .site-row {
      display: flex; align-items: center; gap: 12px;
      padding: 12px; border-bottom: 1px solid var(--light);
    }
    .site-row:last-child { border-bottom: none; }
    .site-row img { width: 40px; height: 40px; object-fit: contain; border-radius: 6px; background: var(--light); }
    .site-row .name { flex: 1; font-weight: 600; }
    .site-row .btn { padding: 8px 14px; font-size: 13px; }
    .empty-msg { color: #888; font-size: 14px; padding: 12px; text-align: center; }
    .actions { display: flex; gap: 10px; margin-top: 16px; flex-wrap: wrap; }
    #logo-preview { max-width: 80px; max-height: 80px; margin-bottom: 12px; display: none; border-radius: 6px; }
    .info { background: #eef; padding: 12px; border-radius: 8px; font-size: 13px; color: #335; margin-bottom: 20px; line-height: 1.5; }
  </style>
</head>
<body>
  <h1>F3 Logo Admin</h1>
  <p class="subtitle">Manage your region's site logos. Open this file locally — never host it.</p>

  <div class="info">
    <strong>How to use:</strong> Load your existing sites.json → add or remove sites → export the updated file → upload it to your website alongside index.html.
  </div>

  <div class="section">
    <h2>1. Load Existing sites.json</h2>
    <input type="file" id="load-json" accept=".json">
    <p id="load-status" style="font-size:13px; color:#888;"></p>
  </div>

  <div class="section">
    <h2>2. Current Sites</h2>
    <div id="site-list"></div>
  </div>

  <div class="section">
    <h2>3. Add New Site</h2>
    <label for="new-name">Site Name</label>
    <input type="text" id="new-name" placeholder="e.g. The Forge">
    <label for="new-logo">Logo (PNG)</label>
    <input type="file" id="new-logo" accept="image/png">
    <img id="logo-preview" alt="Preview">
    <br>
    <button class="btn btn-primary" id="btn-add-site">Add Site</button>
  </div>

  <div class="actions">
    <button class="btn btn-primary" id="btn-export">Export sites.json</button>
  </div>

  <script>
    let sites = [];

    const siteListEl = document.getElementById('site-list');
    const loadInput = document.getElementById('load-json');
    const loadStatus = document.getElementById('load-status');
    const newNameInput = document.getElementById('new-name');
    const newLogoInput = document.getElementById('new-logo');
    const logoPreview = document.getElementById('logo-preview');

    // Load JSON
    loadInput.addEventListener('change', e => {
      const file = e.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = ev => {
        try {
          sites = JSON.parse(ev.target.result);
          sites.sort((a, b) => a.name.localeCompare(b.name));
          loadStatus.textContent = `Loaded ${sites.length} site(s).`;
          renderList();
        } catch (err) {
          loadStatus.textContent = 'Error: Invalid JSON file.';
        }
      };
      reader.readAsText(file);
    });

    // Render list
    function renderList() {
      if (sites.length === 0) {
        siteListEl.innerHTML = '<div class="empty-msg">No sites yet. Add one below.</div>';
        return;
      }
      siteListEl.innerHTML = '';
      sites.forEach((site, i) => {
        const row = document.createElement('div');
        row.className = 'site-row';

        if (site.logo) {
          const img = document.createElement('img');
          img.src = site.logo;
          img.alt = site.name;
          row.appendChild(img);
        }

        const name = document.createElement('span');
        name.className = 'name';
        name.textContent = site.name;
        row.appendChild(name);

        const removeBtn = document.createElement('button');
        removeBtn.className = 'btn btn-danger';
        removeBtn.textContent = 'Remove';
        removeBtn.addEventListener('click', () => {
          if (confirm(`Remove "${site.name}"?`)) {
            sites.splice(i, 1);
            renderList();
          }
        });
        row.appendChild(removeBtn);

        siteListEl.appendChild(row);
      });
    }

    // Logo preview
    newLogoInput.addEventListener('change', e => {
      const file = e.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = ev => {
        logoPreview.src = ev.target.result;
        logoPreview.style.display = 'block';
      };
      reader.readAsDataURL(file);
    });

    // Add site
    document.getElementById('btn-add-site').addEventListener('click', () => {
      const name = newNameInput.value.trim();
      if (!name) { alert('Enter a site name.'); return; }
      const file = newLogoInput.files[0];
      if (!file) { alert('Select a logo PNG.'); return; }

      const reader = new FileReader();
      reader.onload = ev => {
        sites.push({ name: name, logo: ev.target.result });
        sites.sort((a, b) => a.name.localeCompare(b.name));
        newNameInput.value = '';
        newLogoInput.value = '';
        logoPreview.style.display = 'none';
        renderList();
      };
      reader.readAsDataURL(file);
    });

    // Export
    document.getElementById('btn-export').addEventListener('click', () => {
      if (sites.length === 0) { alert('No sites to export.'); return; }
      const json = JSON.stringify(sites, null, 2);
      const blob = new Blob([json], { type: 'application/json' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = 'sites.json';
      a.click();
      URL.revokeObjectURL(url);
    });

    renderList();
  </script>
</body>
</html>
